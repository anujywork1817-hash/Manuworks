# ============================================================
#  DocAssist — Local Development Infrastructure
#  Services: PostgreSQL · Qdrant · Redis · pgAdmin · App
# ============================================================

networks:
  docassist_net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  storage_data:

services:

  # ----------------------------------------------------------
  # PostgreSQL 16 — Primary relational database
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: docassist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-docassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret123}
      POSTGRES_DB:       ${POSTGRES_DB:-docassist_db}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - docassist_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docassist} -d ${POSTGRES_DB:-docassist_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # Qdrant — Self-hosted vector database for semantic search
  # ----------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docassist_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - docassist_net
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # Redis 7 — Session cache & rate limiting
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: docassist_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redissecret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "6380:6379"   # Host 6380 → Container 6379 (avoids conflict with local Redis)
    volumes:
      - redis_data:/data
    networks:
      - docassist_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------
  # pgAdmin 4 — PostgreSQL web GUI (dev only)
  # Access: http://localhost:5050
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: docassist_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@docassist.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    networks:
      - docassist_net
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev   # Only starts with: docker compose --profile dev up

  # ----------------------------------------------------------
  # DocAssist Backend — Go/Gin API Server
  # Built from local Dockerfile (used in staging/prod)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docassist_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override .env with internal container hostnames
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_SSL_MODE: disable
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      QDRANT_HOST:   qdrant
      QDRANT_PORT:   6333
      APP_ENV:       production
      APP_DEBUG:     "false"
      LOG_OUTPUT:    stdout
    ports:
      - "8080:8080"
    volumes:
      - storage_data:/app/storage
    networks:
      - docassist_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

# ============================================================
#  USAGE GUIDE
#
#  Start infrastructure only (recommended for local dev):
#    docker compose up -d postgres qdrant redis
#
#  Start infrastructure + pgAdmin GUI:
#    docker compose --profile dev up -d
#
#  Start everything including backend:
#    docker compose --profile dev --profile app up -d
#
#  View logs:
#    docker compose logs -f postgres
#    docker compose logs -f backend
#
#  Stop everything: 
#    docker compose down
#
#  Full reset (deletes all data):
#    docker compose down -v --remove-orphans
#
#  pgAdmin URL:   http://localhost:5050
#  Qdrant UI:     http://localhost:6333/dashboard
#  Backend API:   http://localhost:8080
#  Swagger Docs:  http://localhost:8080/swagger/index.html
# ============================================================

